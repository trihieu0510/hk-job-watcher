name: Reaction Poller

on:
  schedule:
    - cron: '*/30 * * * *'     # every 30 min; forwards ✅/📌 reactions to #starred-jobs
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: job-watcher-shared    # shared with the daily watcher to avoid push races
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Poll reactions          # stdlib only -- no Playwright, fast
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python _reaction_poller.py

      - name: Persist state + tracker
        run: |
          git config user.name  "job-watcher-bot"
          git config user.email "bot@users.noreply.github.com"
          git add _watcher_state.json applications_tracker.csv JOB_TRACKER.md || true
          git commit -m "poll $(date -u +%Y-%m-%dT%H:%M) [skip ci]" || echo "no changes to commit"
          git pull --rebase --autostash origin main || true
          git push || echo "nothing to push"
